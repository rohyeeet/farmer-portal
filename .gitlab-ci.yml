image: docker:24.0.5

stages:
  - validate
  - build
  - deploy

variables:
  AWS_REGION: "ap-south-1"
  ECR_REPOSITORY: "362117393390.dkr.ecr.ap-south-1.amazonaws.com/common/farmer-portal"
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"
  DOCKER_TLS_CERTDIR: ""

# Prevent duplicate pipelines (branch + MR for same commit)
workflow:
  auto_cancel:
    on_new_commit: interruptible
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "development" || $CI_COMMIT_BRANCH == "test" || $CI_COMMIT_BRANCH == "main"'

# ==========================================
# VALIDATE
# ==========================================
validate:
  stage: validate
  image: node:22
  interruptible: true
  tags:
    - docker
    - frontier
  timeout: 30m
  variables:
    CI: "true"
    npm_config_cache: "$CI_PROJECT_DIR/.npm"
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
      - node_modules/
    policy: pull-push
  before_script:
    - npm ci
  script:
    - echo "Running ESLint..."
    - npm run lint
    - echo "Running TypeScript type check..."
    - npm run typecheck
    - echo "Validation complete."
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "development" || $CI_COMMIT_BRANCH == "test" || $CI_COMMIT_BRANCH == "main"'

# ==========================================
# TEST BUILD
# ==========================================
build_image_test:
  stage: build
  interruptible: true
  tags:
    - docker
    - frontier
  services:
    - name: docker:24.0.5-dind
      alias: docker
  variables:
    NEXT_PUBLIC_API_BASE_URL: "https://backendtest.varahaag.com"
  before_script:
    - echo "Logging into ECR..."
    - apk add --no-cache aws-cli
    - aws configure set region $AWS_REGION
    - aws sts get-caller-identity
  script:
    - echo "Building Docker image for test branch..."
    - docker --version
    - docker build --build-arg NEXT_PUBLIC_API_BASE_URL="$NEXT_PUBLIC_API_BASE_URL" --build-arg NEXT_PUBLIC_GOOGLE_MAP_API_KEY="${NEXT_PUBLIC_GOOGLE_MAP_API_KEY:-}" -t $ECR_REPOSITORY:$IMAGE_TAG-test .
    - echo "Pushing Docker image to ECR..."
    - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REPOSITORY
    - docker push $ECR_REPOSITORY:$IMAGE_TAG-test
  rules:
    - if: '$CI_COMMIT_BRANCH == "test"'
  needs:
    - validate

# ==========================================
# DEPLOY TEST
# ==========================================
deploy_test:
  stage: deploy
  resource_group: deploy-test
  tags:
    - docker
    - frontier
  variables:
    EKS_CLUSTER_NAME: "Varaha-Test"
  before_script:
    - echo "Setting up deployment..."
    - apk add --no-cache aws-cli curl
    - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
    - chmod +x ./kubectl
    - mv ./kubectl /usr/local/bin/kubectl
    - aws configure set region $AWS_REGION
    - aws sts get-caller-identity
  script:
    - echo "Deploying test image to Kubernetes..."
    - aws eks --region "$AWS_REGION" update-kubeconfig --name "$EKS_CLUSTER_NAME"
    - sed -i "s|DOCKER_IMAGE|$ECR_REPOSITORY:$IMAGE_TAG-test|g" deploy/k8s/deployment.yaml
    - kubectl apply -f deploy/k8s/deployment.yaml -n platform
    - kubectl apply -f deploy/k8s/test/ingress.yaml -n platform
    - kubectl apply -f deploy/k8s/service.yaml -n platform
    - kubectl rollout status deployment/farmer-portal -n platform --timeout=180s
  rules:
    - if: '$CI_COMMIT_BRANCH == "test"'
  needs:
    - build_image_test

# ==========================================
# PROD BUILD
# ==========================================
build_image_prod:
  stage: build
  interruptible: true
  tags:
    - docker
    - frontier
  services:
    - name: docker:24.0.5-dind
      alias: docker
  variables:
    NEXT_PUBLIC_API_BASE_URL: "https://backend.varahaag.com"
  before_script:
    - echo "Logging into ECR..."
    - apk add --no-cache aws-cli
    - aws configure set region $AWS_REGION
    - aws sts get-caller-identity
  script:
    - echo "Building Docker image for production branch..."
    - docker --version
    - docker build --build-arg NEXT_PUBLIC_API_BASE_URL="$NEXT_PUBLIC_API_BASE_URL" --build-arg NEXT_PUBLIC_GOOGLE_MAP_API_KEY="${NEXT_PUBLIC_GOOGLE_MAP_API_KEY:-}" -t $ECR_REPOSITORY:$IMAGE_TAG .
    - echo "Pushing Docker image to ECR..."
    - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REPOSITORY
    - docker push $ECR_REPOSITORY:$IMAGE_TAG
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  needs:
    - validate

# ==========================================
# DEPLOY PROD
# ==========================================
deploy_prod:
  stage: deploy
  resource_group: deploy-prod
  tags:
    - docker
    - frontier
  variables:
    EKS_CLUSTER_NAME: "Varaha-Prod"
  before_script:
    - echo "Setting up deployment..."
    - apk add --no-cache aws-cli curl
    - echo "Installing kubectl..."
    - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
    - chmod +x ./kubectl
    - mv ./kubectl /usr/local/bin/kubectl
    - aws configure set region $AWS_REGION
    - aws sts get-caller-identity
  script:
    - echo "Deploying production image to Kubernetes..."
    - sed -i "s|DOCKER_IMAGE|$ECR_REPOSITORY:$IMAGE_TAG|g" deploy/k8s/deployment.yaml
    - aws eks --region "$AWS_REGION" update-kubeconfig --name "$EKS_CLUSTER_NAME"
    - kubectl apply -f deploy/k8s/deployment.yaml -n platform
    - kubectl apply -f deploy/k8s/prod/ingress.yaml -n platform
    - kubectl apply -f deploy/k8s/service.yaml -n platform
    - kubectl rollout status deployment/farmer-portal -n platform --timeout=180s
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
  needs:
    - build_image_prod
